<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>條碼比對工具</title>
  
  <!-- 載入雙引擎 SDK -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.12.1/dist/quagga.min.js"></script>
  
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      margin: 0; padding: 15px; box-sizing: border-box;
    }
    .header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 15px;
    }
    .title { margin: 0; color: #333; font-size: 22px; }
    .lang-select {
      padding: 5px 10px; border-radius: 5px;
      border: 1px solid #ccc; font-size: 14px; background: #fff;
    }
    .card {
      background: #fff; padding: 15px; border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px;
    }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    input[type="text"] {
      width: 100%; padding: 12px; font-size: 16px;
      border: 1px solid #ccc; border-radius: 6px;
      box-sizing: border-box; margin-bottom: 10px;
      background-color: #fafafa; outline: none;
    }
    input[type="text"]:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 5px rgba(13, 110, 253, 0.3);
    }
    .button-group { display: flex; gap: 10px; margin-bottom: 10px; }
    button {
      flex: 1; padding: 12px; font-size: 16px;
      border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
    }
    .btn-scan      { background-color: #0d6efd; color: white; }
    .btn-clear     { background-color: #6c757d; color: white; }
    .btn-clear-all { background-color: #dc3545; color: white; }
    .btn-compare   { background-color: #198754; color: white; }

    /* 文字連結按鈕（主畫面） */
    .link-button {
      background: none; border: none; padding: 0; color: #0d6efd;
      text-decoration: underline; cursor: pointer; font-size: 14px;
    }

    /* 隱私權摘要 Modal */
    #privacyModal.modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 3000; justify-content: center; align-items: center; padding: 15px;
    }
    
    /* 更新：改為 Flex 排版並限制最大高度 */
    #privacyModal .modal-content {
      background: #fff; border-radius: 12px; width: 100%; max-width: 520px;
      max-height: 85vh; /* 限制最大高度為螢幕的 85% */
      display: flex; flex-direction: column; /* 允許內部區塊彈性伸縮 */
      padding: 20px; text-align: left; line-height: 1.6;
      box-sizing: border-box;
    }

    .privacy-title { margin: 0 0 10px 0; font-size: 18px; font-weight: bold; flex-shrink: 0; }
    
    /* 新增：讓內容區塊產生捲軸 */
    #privacyContent {
      overflow-y: auto; /* 內容過長時出現上下捲軸 */
      flex: 1;          /* 佔滿剩餘空間 */
      padding-right: 5px; /* 避免文字貼齊捲軸 */
      margin-bottom: 10px; /* 與下方按鈕保持距離 */
    }

    /* 美化捲軸 (適用於 Webkit 瀏覽器如 Chrome/Safari/Edge) */
    #privacyContent::-webkit-scrollbar { width: 6px; }
    #privacyContent::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .privacy-list { margin: 0 0 0 20px; padding: 0; font-size: 14px; color: #333; }
    .privacy-list li { margin-bottom: 8px; }
    .privacy-footnote { margin-top: 15px; font-size: 12.5px; color: #666; }

    /* ── 掃描器覆蓋層 ── */
    #scanner-container {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      padding: 8px 10px;
      padding-top:    calc(8px + env(safe-area-inset-top,    0px));
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      box-sizing: border-box;
    }

    /* 頂部操作列 (鏡頭選單 + 手電筒) */
    .top-controls-wrap {
      flex-shrink: 0; width: 100%; max-width: 520px;
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .camera-selector-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
    .camera-selector-wrap label { color: #fff; font-size: 14px; white-space: nowrap; margin: 0; font-weight: normal; }
    #cameraSelect {
      flex: 1; padding: 8px 10px; font-size: 14px;
      border-radius: 6px; border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.12); color: #fff;
    }
    #cameraSelect option   { color: #333; background: #fff; }
    #cameraSelect:disabled { opacity: 0.6; }

    /* ★ 手電筒按鈕與錯誤動畫 */
    #btn-torch {
      display: none; flex-shrink: 0; padding: 8px 14px; font-size: 18px;
      border-radius: 6px; background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4); color: #fff; cursor: pointer; transition: background 0.2s;
    }
    #btn-torch.active { background: #ffc107; color: #000; border-color: #ffc107; }
    @keyframes shake {
      0% { transform: translateX(0); } 25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); } 75% { transform: translateX(-4px); } 100% { transform: translateX(0); }
    }
    .error-shake { animation: shake 0.3s; background: #dc3545 !important; border-color: #dc3545 !important; }

    /* 1D / 2D 切換按鈕 */
    .scan-mode-wrap {
      flex-shrink: 0; width: 100%; max-width: 520px; display: flex; gap: 6px; padding: 4px;
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08); margin-bottom: 10px; box-sizing: border-box;
    }
    .btn-mode {
      flex: 1 1 0; padding: 8px 10px; font-size: 13px; font-weight: bold;
      border-radius: 10px; border: 1px solid transparent; background: transparent;
      color: rgba(255,255,255,0.75); cursor: pointer; line-height: 1.1; transition: background 0.2s, color 0.2s;
    }
    .btn-mode.active { background: #ffffff; color: #1a1a1a; border-color: #ffffff; }

    /* 雙引擎容器 */
    #reader-wrap {
      width: 100%; max-width: 520px; flex: 1; min-height: 0; position: relative;
      overflow: hidden; border-radius: 10px; background: #000;
    }
    #html5qr-reader, #quagga-reader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #quagga-reader video, #quagga-reader canvas {
      width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;
    }

    /* 自製輔助 UI 框 */
    #scanGuide {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); pointer-events: none;
      box-sizing: border-box; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      filter: drop-shadow(0 0 6px rgba(0,0,0,0.35)); z-index: 10;
    }
    #scanGuide.mode-2d { width: min(72%, 340px); aspect-ratio: 1 / 1; height: auto; }
    #scanGuide.mode-1d { width: min(90%, 460px); height: clamp(110px, 20vh, 160px); border-radius: 10px; }

    /* 四角點綴 */
    .corner {
      position: absolute; width: 26px; height: 26px; box-sizing: border-box;
      border: 4px solid rgba(0, 229, 255, 0.9); filter: drop-shadow(0 0 6px rgba(0,229,255,0.18));
    }
    .corner.tl { left: -2px; top: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 10px; }
    .corner.tr { right: -2px; top: -2px; border-left: 0; border-bottom: 0; border-top-right-radius: 10px; }
    .corner.bl { left: -2px; bottom: -2px; border-right: 0; border-top: 0; border-bottom-left-radius: 10px; }
    .corner.br { right: -2px; bottom: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 10px; }

    /* 1D 掃描線 */
    .scan-line {
      position: absolute; left: 10px; right: 10px; top: 50%; height: 2px;
      background: rgba(255, 70, 70, 0.85); box-shadow: 0 0 10px rgba(255, 70, 70, 0.35);
      transform: translateY(-50%); display: none;
    }
    #scanGuide.mode-1d .scan-line { display: block; }

    /* 取消按鈕 */
    .btn-cancel-scan {
      flex-shrink: 0; margin-top: 10px; margin-bottom: 4px;
      background-color: #dc3545; color: white; width: auto; padding: 8px 22px; font-size: 14px;
    }

    /* ── 結果 Modal ── */
    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center;
    }
    .modal-content {
      background: white; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px;
      text-align: center; font-size: 18px; line-height: 1.6;
    }
    .modal-content p { margin: 10px 0; word-break: break-all; }
    .result-text { font-size: 24px; font-weight: bold; margin-top: 15px; }
    .match    { color: #198754; }
    .mismatch { color: #dc3545; }

    /* ── 音效開關 ── */
    .sound-toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 12px; padding-top: 12px; border-top: 1px solid #e9ecef;
    }
    .sound-toggle-row > span { font-weight: bold; font-size: 14px; }
    .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch-slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc; border-radius: 26px; transition: 0.3s;
    }
    .switch-slider:before {
      content: ""; position: absolute;
      height: 20px; width: 20px; left: 3px; bottom: 3px;
      background-color: white; border-radius: 50%; transition: 0.3s;
    }
    .switch input:checked + .switch-slider { background-color: #198754; }
    .switch input:checked + .switch-slider:before { transform: translateX(20px); }

    /* ── 比對結果 Modal 大面積顏色 ── */
    #resultModal .modal-content { max-width: 480px; transition: background 0.15s; }
    #resultModal .modal-content.result-success { background: #198754; }
    #resultModal .modal-content.result-failure { background: #dc3545; }
    #resultModal .modal-content.result-success p,
    #resultModal .modal-content.result-success strong,
    #resultModal .modal-content.result-failure p,
    #resultModal .modal-content.result-failure strong { color: white; }
    #resultModal .modal-content.result-success hr,
    #resultModal .modal-content.result-failure hr { border-color: rgba(255,255,255,0.4); }
    .barcode-values { }
    #resultModal .modal-content.result-success .barcode-values,
    #resultModal .modal-content.result-failure .barcode-values {
      background: rgba(255,255,255,0.18); border-radius: 8px; padding: 10px; margin-bottom: 5px;
    }
    .result-text { font-size: 24px; font-weight: bold; margin-top: 15px; }
    #resultModal .modal-content.result-success .result-text,
    #resultModal .modal-content.result-failure .result-text { font-size: 38px; color: white; }
    #resultModal .modal-content.result-success .btn-clear,
    #resultModal .modal-content.result-failure .btn-clear {
      background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.6); color: white;
    }

    .mode-selector {
      display: flex; justify-content: space-around; padding: 10px;
      background: #e9ecef; border-radius: 8px;
    }
    .mode-selector label { font-weight: normal; margin: 0; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">
    <h2 class="title" id="ui-title">條碼比對工具</h2>
    <select class="lang-select" id="langSelector" onchange="changeLanguage()">
      <option value="zh-TW" selected>繁體中文</option>
      <option value="en">English</option>
      <option value="vi">Tiếng Việt</option>
    </select>
  </div>

  <!-- 隱私權按鈕 -->
  <div style="margin: 5px 0 15px 0; text-align: left;">
    <button type="button" class="link-button" id="ui-privacy-link" onclick="openPrivacyModal()">
      隱私權摘要
    </button>
  </div>

  <div class="card">
    <!-- 觸發方式 -->
    <label id="ui-trigger-label">觸發方式：</label>
    <div class="mode-selector" style="margin-bottom: 15px;">
      <label>
        <input type="radio" name="compareTrigger" value="auto" onchange="checkAutoCompare()" checked>
        <span id="ui-trigger-auto">自動比對</span>
      </label>
      <label>
        <input type="radio" name="compareTrigger" value="manual" onchange="checkAutoCompare()">
        <span id="ui-trigger-manual">手動點選</span>
      </label>
    </div>

    <!-- 比對規則 -->
    <label id="ui-rule-label">比對規則：</label>
    <div class="mode-selector" style="margin-bottom: 0;">
      <label>
        <input type="radio" name="compareRule" value="exact" onchange="checkAutoCompare()" checked>
        <span id="ui-rule-exact">完全比對 (A = B)</span>
      </label>
      <label>
        <input type="radio" name="compareRule" value="partial" onchange="checkAutoCompare()">
        <span id="ui-rule-partial">包含比對 (短在長內)</span>
      </label>
    </div>

    <!-- 提示音開關 -->
    <div class="sound-toggle-row">
      <span id="ui-sound-label">🔔 比對提示音</span>
      <label class="switch">
        <input type="checkbox" id="soundToggle" checked>
        <span class="switch-slider"></span>
      </label>
    </div>
  </div>

  <div class="card">
    <label id="ui-field-a-label">A 欄位</label>
    <input type="text" id="fieldA" placeholder="" oninput="checkAutoCompare()">
    <div class="button-group">
      <button class="btn-scan"  id="ui-btn-scan-a"  onclick="startScan('A')">📷 掃描 A</button>
      <button class="btn-clear" id="ui-btn-clear-a" onclick="clearField('A')">清除 A</button>
    </div>
  </div>

  <div class="card">
    <label id="ui-field-b-label">B 欄位</label>
    <input type="text" id="fieldB" placeholder="" oninput="checkAutoCompare()">
    <div class="button-group">
      <button class="btn-scan"  id="ui-btn-scan-b"  onclick="startScan('B')">📷 掃描 B</button>
      <button class="btn-clear" id="ui-btn-clear-b" onclick="clearField('B')">清除 B</button>
    </div>
  </div>

  <div class="card">
    <div class="button-group">
      <button class="btn-clear-all" id="ui-btn-clear-all" onclick="clearAll()">🗑️ 清除全部</button>
      <button class="btn-compare"   id="ui-btn-compare"   onclick="manualCompare()">🔍 執行比對</button>
    </div>
  </div>

  <div id="scanner-container">
    <div class="top-controls-wrap">
      <div class="camera-selector-wrap">
        <label id="ui-camera-label">切換鏡頭：</label>
        <select id="cameraSelect" onchange="switchCamera(this.value)" disabled>
          <option id="ui-camera-loading-opt">載入鏡頭清單...</option>
        </select>
      </div>
      <button id="btn-torch" onclick="toggleTorch()" title="開關手電筒">🔦</button>
    </div>

    <div class="scan-mode-wrap" role="group" aria-label="Scan mode">
      <button class="btn-mode active" id="btn-mode-1d" onclick="setScanMode('1D')" type="button">
        <span id="ui-btn-mode-1d">1D 條碼</span>
      </button>
      <button class="btn-mode" id="btn-mode-2d" onclick="setScanMode('2D')" type="button">
        <span id="ui-btn-mode-2d">2D / QR Code</span>
      </button>
    </div>

    <div id="reader-wrap">
      <div id="html5qr-reader" style="display:none;"></div>
      <div id="quagga-reader" style="display:none;"></div>

      <div id="scanGuide" class="mode-1d" aria-hidden="true">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <div class="scan-line"></div>
      </div>
    </div>

    <button class="btn-cancel-scan" id="ui-btn-cancel-scan" onclick="stopScan()">取消掃描</button>
  </div>

  <!-- 比對結果 Modal -->
  <div id="resultModal" class="modal">
    <div class="modal-content">
      <div class="barcode-values">
        <p><strong id="ui-modal-row1">第一列 (A欄位)</strong><br><span id="modalValA"></span></p>
        <p><strong id="ui-modal-row2">第二列 (B欄位)</strong><br><span id="modalValB"></span></p>
      </div>
      <hr>
      <p id="modalResult" class="result-text"></p>
      <button class="btn-clear" id="ui-modal-close"
              style="width:100%;margin-top:15px" onclick="closeModal()">關閉</button>
    </div>
  </div>

  <!-- 隱私權彈窗 -->
  <div id="privacyModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="privacyTitle">
    <div class="modal-content">
      <h3 class="privacy-title" id="privacyTitle">隱私權摘要 (Privacy Summary)</h3>
      <div id="privacyContent"></div>
      <button type="button" class="btn-clear" style="width:100%; margin-top: 15px;" id="ui-privacy-close" onclick="closePrivacyModal()">
        關閉
      </button>
    </div>
  </div>

  <script>
    // ── 隱私權彈窗控制 ──
    function openPrivacyModal() { document.getElementById('privacyModal').style.display = 'flex'; }
    function closePrivacyModal() { document.getElementById('privacyModal').style.display = 'none'; }
    document.addEventListener('click', (e) => {
      const modal = document.getElementById('privacyModal');
      if (modal && modal.style.display === 'flex' && e.target === modal) closePrivacyModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePrivacyModal(); });

    // ── 音效 ──
    function playBeep(type) {
      if (!document.getElementById('soundToggle').checked) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (type === 'success') {
          // 兩段上升音：清脆 ding-dong
          [880, 1100].forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            const t = ctx.currentTime + i * 0.18;
            gain.gain.setValueAtTime(0.35, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
            osc.start(t); osc.stop(t + 0.25);
          });
        } else {
          // 低沉鋸齒波：警示嗡嗡聲
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.value = 180;
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.55);
        }
      } catch(e) {}
    }

    // ── 系統全域變數 ──
    let html5QrCode       = null;
    let isHtml5QrScanning = false;
    let isQuaggaScanning  = false;
    
    let quaggaLastCode    = "";
    let quaggaCodeCount   = 0;
    const REQUIRED_MATCHES = 2; 

    let currentTarget     = null;
    let currentLang       = 'zh-TW';
    let cameras           = [];
    let scanMode          = '1D'; 
    let currentCameraId   = null;
    let isTorchOn         = false;

    // ── i18n 翻譯表 ──
    const translations = {
      'zh-TW': {
        title         : '條碼比對工具',
        privacyLink   : '隱私權摘要',
        privacyTitle  : '隱私權聲明與告知事項 (Privacy Summary)',
        privacyHtml   : `
          <ul class="privacy-list">
            <li><strong>處理方式與範圍：</strong>本工具為純前端網頁應用程式，條碼掃描、字串比對皆在您的裝置本機瀏覽器內完成。本程式不會將掃描的條碼、相機影像或欄位內容傳送至任何後端伺服器。</li>
            <li><strong>權限與控制：</strong>相機權限僅在您啟動掃描時使用，您可於瀏覽器設定中隨時撤銷權限。我們不需註冊帳號、不建立使用者數位足跡或進行建檔 (Profiling)。</li>
            <li><strong>第三方與連線紀錄：</strong>本頁面透過第三方 CDN 載入開源條碼套件，該 CDN 供應商或網頁代管平台 (如 GitHub Pages) 可能依其系統預設保留一般技術性存取紀錄（如 IP 位址、User-Agent 等）。</li>
            <li><strong>當事人權利與聯絡方式：</strong>為符合台灣個資法 (PDPA) 及歐盟 GDPR 第13條之精神，若您對個人資料處理有任何疑問或欲行使相關權利，請聯繫：<a href="mailto:sspig0127+github@gmail.com">sspig0127+github@gmail.com</a></li>
          </ul>
        `,
        triggerLabel  : '觸發方式：',
        triggerAuto   : '自動比對',
        triggerManual : '手動點選',
        ruleLabel     : '比對規則：',
        ruleExact     : '完全比對 (A = B)',
        rulePartial   : '包含比對 (短在長內)',
        fieldALabel   : 'A 欄位',
        fieldBLabel   : 'B 欄位',
        placeholder   : '手動輸入或點下方掃描',
        btnScanA      : '📷 掃描 A',

      document.getElementById('btn-mode-1d').classList.toggle('active', scanMode === '1D');
      document.getElementById('btn-mode-2d').classList.toggle('active', scanMode === '2D');

      const guide = document.getElementById('scanGuide');
      guide.classList.toggle('mode-1d', scanMode === '1D');
      guide.classList.toggle('mode-2d', scanMode === '2D');
    }

      document.getElementById('ui-title').innerText            = t.title;

      document.getElementById('ui-trigger-auto').innerText     = t.triggerAuto;

    async function checkTorchCapability(track) {
      const btnTorch = document.getElementById('btn-torch');
      if (track && typeof track.getCapabilities === 'function') {
        const capabilities = track.getCapabilities();
        const isTorchSupported = !!capabilities.torch || 
                                 ('fillLightMode' in capabilities && capabilities.fillLightMode.includes('flash'));
        if (isTorchSupported) {
          btnTorch.style.display = 'block';
          if (isTorchOn) {
            try {
              await track.applyConstraints({ advanced: [{ torch: true }] });
              btnTorch.classList.add('active');
            } catch(e) { 
              isTorchOn = false; btnTorch.classList.remove('active');
            }
          }
          return;
        }
      }
      btnTorch.style.display = 'none';
      isTorchOn = false; btnTorch.classList.remove('active');
    }

    async function toggleTorch() {
      let track = null;
      let targetState = !isTorchOn;

      try {
        if (scanMode === '2D' && isHtml5QrScanning) {
          const capabilities = html5QrCode.getRunningTrackCameraCapabilities();
          if (capabilities && capabilities.torchFeature) {
             await capabilities.torchFeature().apply(targetState);
             isTorchOn = targetState;
             document.getElementById('btn-torch').classList.toggle('active', isTorchOn);
             return; 
          } else {
             const video = document.querySelector('#html5qr-reader video');
             if (video && video.srcObject) track = video.srcObject.getVideoTracks()[0];
          }
        } else if (scanMode === '1D' && isQuaggaScanning) {
          track = Quagga.CameraAccess.getActiveTrack();
        }

        if (track && typeof track.applyConstraints === 'function') {
           await track.applyConstraints({ advanced: [{ torch: targetState }] });
           isTorchOn = targetState;
           document.getElementById('btn-torch').classList.toggle('active', isTorchOn);
        }
      } catch (err) {
        const btn = document.getElementById('btn-torch');
        btn.classList.add('error-shake');
        setTimeout(() => btn.classList.remove('error-shake'), 300);
        document.getElementById('btn-torch').classList.toggle('active', isTorchOn);
      }
    }

    async function setScanMode(mode) {
      if (scanMode === mode) return;
      scanMode = mode;
      applyScanModeUI();
      
      if (document.getElementById('scanner-container').style.display === 'flex') {
        const select = document.getElementById('cameraSelect');
        select.disabled = true;
        document.getElementById('btn-torch').style.display = 'none';
        try {
          if (currentCameraId) await startEngine(currentCameraId);
          else await startEngineFallback();
        } catch (err) {
          alert(translations[currentLang].alertCamFail + '\n' + err);
          await stopScan();
        } finally {
          select.disabled = false;
        }
      }
    }

    async function stopActiveEngines() {
      if (isHtml5QrScanning && html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) {}
        isHtml5QrScanning = false;
      }
      if (isQuaggaScanning) {
        try { Quagga.stop(); } catch (e) {}
        isQuaggaScanning = false;
      }
      document.getElementById('btn-torch').style.display = 'none';
    }

    async function startEngine(cameraId) {
      await stopActiveEngines();
      currentCameraId = cameraId;

      document.getElementById('html5qr-reader').style.display = scanMode === '2D' ? 'block' : 'none';
      document.getElementById('quagga-reader').style.display  = scanMode === '1D' ? 'block' : 'none';

      if (scanMode === '2D') {
        if (!html5QrCode) html5QrCode = new Html5Qrcode('html5qr-reader');
        const config = {
          fps: 15, useBarCodeDetectorIfSupported: true,
          videoConstraints: {
            deviceId: { exact: cameraId }, width: { ideal: 1280 }, height: { ideal: 720 },
            advanced: [{ focusMode: 'continuous' }]
          }
        };
        await html5QrCode.start({ deviceId: { exact: cameraId } }, config, onScanSuccess);
        isHtml5QrScanning = true;
        setTimeout(() => {
           const videoTrack = document.querySelector('#html5qr-reader video')?.srcObject?.getVideoTracks()[0];
           if (videoTrack) checkTorchCapability(videoTrack);
        }, 800);
      } else {
        quaggaLastCode = ""; quaggaCodeCount = 0;
        document.getElementById('quagga-reader').innerHTML = ''; 
        return new Promise((resolve, reject) => {
          Quagga.init({
            inputStream: {
              name: "Live", type: "LiveStream", target: document.querySelector('#quagga-reader'),
              constraints: { deviceId: { exact: cameraId }, width: { ideal: 1280 }, height: { ideal: 720 } }
            },
            decoder: { readers: ["code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader", "code_39_vin_reader", "codabar_reader", "upc_reader", "upc_e_reader", "i2of5_reader"] },
            locate: true
          }, function(err) {
            if (err) { reject(err); return; }
            Quagga.start(); isQuaggaScanning = true;
            setTimeout(() => checkTorchCapability(Quagga.CameraAccess.getActiveTrack()), 800);
            resolve();
          });
        });
      }
    }

    async function startEngineFallback() {
      await stopActiveEngines();
      currentCameraId = null;

      document.getElementById('html5qr-reader').style.display = scanMode === '2D' ? 'block' : 'none';
      document.getElementById('quagga-reader').style.display  = scanMode === '1D' ? 'block' : 'none';

      if (scanMode === '2D') {
        if (!html5QrCode) html5QrCode = new Html5Qrcode('html5qr-reader');
        await html5QrCode.start(
          { facingMode: 'environment' }, { fps: 15, useBarCodeDetectorIfSupported: true }, onScanSuccess
        );
        isHtml5QrScanning = true;
        setTimeout(() => {
           const videoTrack = document.querySelector('#html5qr-reader video')?.srcObject?.getVideoTracks()[0];
           if (videoTrack) checkTorchCapability(videoTrack);
        }, 800);
      } else {
        quaggaLastCode = ""; quaggaCodeCount = 0;
        document.getElementById('quagga-reader').innerHTML = '';
        return new Promise((resolve, reject) => {
          Quagga.init({
            inputStream: {
              name: "Live", type: "LiveStream", target: document.querySelector('#quagga-reader'),
              constraints: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            },
            decoder: { readers: ["code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader", "code_39_vin_reader", "codabar_reader", "upc_reader", "upc_e_reader", "i2of5_reader"] },
            locate: true
          }, function(err) {
            if (err) { reject(err); return; }
            Quagga.start(); isQuaggaScanning = true;
            setTimeout(() => checkTorchCapability(Quagga.CameraAccess.getActiveTrack()), 800);
            resolve();
          });
        });
      }
    }

    Quagga.onDetected((result) => {
      if (!isQuaggaScanning) return;
      const code = result.codeResult.code;
      if (code === quaggaLastCode) {
        quaggaCodeCount++;
        if (quaggaCodeCount >= REQUIRED_MATCHES) onScanSuccess(code);
      } else {
        quaggaLastCode = code; quaggaCodeCount = 1;
      }
    });

    Quagga.onProcessed(function(result) {
      if (!isQuaggaScanning) return;
      var drawingCtx = Quagga.canvas.ctx.overlay, drawingCanvas = Quagga.canvas.dom.overlay;
      if (result) {
        if (result.boxes) {
          drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute("width")), parseInt(drawingCanvas.getAttribute("height")));
          result.boxes.filter(box => box !== result.box).forEach(box => {
              Quagga.ImageDebug.drawPath(box, {x: 0, y: 1}, drawingCtx, {color: "green", lineWidth: 2});
          });
        }
        if (result.box) Quagga.ImageDebug.drawPath(result.box, {x: 0, y: 1}, drawingCtx, {color: "#00F", lineWidth: 2});
        if (result.codeResult && result.codeResult.code) Quagga.ImageDebug.drawPath(result.line, {x: 'x', y: 'y'}, drawingCtx, {color: 'red', lineWidth: 3});
      }
    });

    async function switchCamera(cameraId) {
      if (!cameraId) return;
      const select = document.getElementById('cameraSelect');
      select.disabled = true;
      document.getElementById('btn-torch').style.display = 'none';
      try { await startEngine(cameraId); } 
      catch (err) { alert(translations[currentLang].alertCamSwitch + '\n' + err); } 
      finally { select.disabled = false; }
    }

    async function startScan(target) {
      currentTarget = target;
      document.getElementById('scanner-container').style.display = 'flex';
      
      const t = translations[currentLang];
      const select = document.getElementById('cameraSelect');
      select.innerHTML = `<option>${t.cameraLoading}</option>`;
      select.disabled  = true;

      try { cameras = await Html5Qrcode.getCameras(); } catch (err) { cameras = []; }

      if (cameras.length > 0) {
        select.innerHTML = '';
        cameras.forEach((cam, idx) => {
          const opt = document.createElement('option');
          opt.value = cam.id; opt.text  = cam.label || `${t.cameraDefault} ${idx + 1}`;
          select.appendChild(opt);
        });
        select.disabled = false;

        const backCam = cameras.find(c => /back|rear|environment|後/i.test(c.label));
        const defaultCam = backCam || cameras[cameras.length - 1];
        select.value = defaultCam.id;

        try { await startEngine(defaultCam.id); } 
        catch (err) { alert(t.alertCamFail + '\n' + err); await stopScan(); }
      } else {
        select.innerHTML = `<option value="">${t.cameraDefault} (預設)</option>`;
        try { await startEngineFallback(); } 
        catch (err) { alert(t.alertCamFail + '\n' + err); await stopScan(); }
      }
    }

    async function stopScan() {
      document.getElementById('scanner-container').style.display = 'none';
      isTorchOn = false; document.getElementById('btn-torch').classList.remove('active');
      await stopActiveEngines();
    }

    function onScanSuccess(decodedText) {
      if (navigator.vibrate) navigator.vibrate(200);
      stopScan(); 
      
      if (currentTarget === 'A') document.getElementById('fieldA').value = decodedText;
      else if (currentTarget === 'B') document.getElementById('fieldB').value = decodedText;
      
      checkAutoCompare();
    }

    function clearField(target) {
      if (target === 'A') document.getElementById('fieldA').value = '';
      if (target === 'B') document.getElementById('fieldB').value = '';
      checkAutoCompare(); // 清除欄位時若設為自動，亦可連動檢查 (或留白不觸發 modal)
    }
    function clearAll() { clearField('A'); clearField('B'); }

    // ── ★ 觸發比對機制 ──
    function checkAutoCompare() {
      const trigger = document.querySelector('input[name="compareTrigger"]:checked').value;
      const valA = document.getElementById('fieldA').value;
      const valB = document.getElementById('fieldB').value;
      
      // 若為「自動比對」模式，且兩個欄位都不為空時才觸發彈出視窗
      if (trigger === 'auto' && valA !== '' && valB !== '') {
        showCompareResult(valA, valB);
      }
    }

    function manualCompare() {
      const valA = document.getElementById('fieldA').value;
      const valB = document.getElementById('fieldB').value;
      if (!valA || !valB) {
        alert(translations[currentLang].alertEmpty);
        return;
      }
      showCompareResult(valA, valB);
    }

    // ── ★ 判斷比對結果邏輯 (增強版) ──
    function showCompareResult(valA, valB) {
      const rule = document.querySelector('input[name="compareRule"]:checked').value;
      
      // 【修正重點】：淨化字串 (Sanitization)
      // 1. 移除所有空白與換行 (\s+) - 解決複製貼上造成的斷行與前後多餘空白
      // 2. 移除所有 ASCII 不可見控制字元 ([\x00-\x1F\x7F]) - 解決 2D 條碼常帶有的 \x1D 等群組分隔符號
      const cleanA = valA.replace(/\s+/g, '').replace(/[\x00-\x1F\x7F]/g, '');
      const cleanB = valB.replace(/\s+/g, '').replace(/[\x00-\x1F\x7F]/g, '');

      let isMatch = false;

      if (rule === 'exact') {
        // 規則 1：完全比對
        isMatch = (cleanA === cleanB);
      } else if (rule === 'partial') {
        // 規則 2：包含比對 (短字串是長字串的一部分)
        if (cleanA.length <= cleanB.length) {
          isMatch = cleanB.includes(cleanA);
        } else {
          isMatch = cleanA.includes(cleanB);
        }
      }

      const t = translations[currentLang];
      
      // 畫面上依然顯示使用者原始輸入的內容，但比對結果是依照淨化後的結果
      document.getElementById('modalValA').innerText = valA;
      document.getElementById('modalValB').innerText = valB;
      
      const el = document.getElementById('modalResult');
      el.innerText  = isMatch ? t.matchSuccess : t.matchFail;
      el.className  = 'result-text ' + (isMatch ? 'match' : 'mismatch');

      const modalContent = document.querySelector('#resultModal .modal-content');
      modalContent.classList.remove('result-success', 'result-failure');
      modalContent.classList.add(isMatch ? 'result-success' : 'result-failure');

      playBeep(isMatch ? 'success' : 'failure');
      document.getElementById('resultModal').style.display = 'flex';
    }


    function closeModal() {
      document.getElementById('resultModal').style.display = 'none';
      const modalContent = document.querySelector('#resultModal .modal-content');
      modalContent.classList.remove('result-success', 'result-failure');
    }

    window.onload = () => {
      changeLanguage();
      applyScanModeUI();
    };
